<div class="max-w-lg mx-auto">
  <div
    class="border-2 border-dashed border-gray-300 rounded-lg p-12 text-center hover:border-blue-400 transition-colors cursor-pointer"
    (drop)="onDrop($event)"
    (dragover)="onDragOver($event)"
    (click)="fileInput.click()"
  >
    <p class="text-gray-500 mb-2">Drag & drop a text file here</p>
    <p class="text-gray-400 text-sm">or click to browse (max 100MB)</p>
    <input #fileInput type="file" accept=".txt" class="hidden" (change)="onFileSelected($event)" />
  </div>

  @if (selectedFile()) {
    <p class="mt-4 text-sm text-gray-600">Selected: {{ selectedFile()!.name }}</p>
  }

  @if (error()) {
    <p class="mt-2 text-red-500 text-sm">{{ error() }}</p>
  }

  <button
    class="mt-6 w-full bg-blue-600 text-white py-3 rounded-lg font-medium hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
    [disabled]="!selectedFile() || uploading()"
    (click)="upload()"
  >
    {{ uploading() ? 'Uploading...' : 'Upload & Process' }}
  </button>
</div>
